<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#content}, ~{})}">
<head>
    <title>Cohort toevoegen</title>
</head>
<body>
<div id="content">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h2 class="fw-bold mb-4" style="color: var(--bro-navy)">Nieuw Cohort</h2>
                <form th:action="@{/cohort/save}" th:object="${newCohort}" method="post">

                    <div th:replace="~{fragments/form :: formField(
                        'name', 'Naam cohort', 'Bijv. Cohort 19', 'text')}">
                    </div>

                    <div th:replace="~{fragments/form :: formField(
                        'startDate', 'Startdatum', '', 'date')}">
                    </div>

                    <div th:replace="~{fragments/form :: formField(
                        'subject', 'Omscholingsrichting', 'Richting van de omscholing', 'text')}">
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Cohort Opslaan</button>
                        <button type="reset" class="btn btn-light text-muted">Formulier leegmaken</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
