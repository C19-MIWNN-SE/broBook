<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#content})}">
<head>
    <title>Cohort overview</title>
</head>
<body>
<div id="content">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h2 class="fw-bold mb-4" style="color: var(--bro-navy)">Nieuw Cohort</h2>
                <form th:action="@{/cohort/save}" th:object="${newCohort}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Cohort naam</label>
                        <input type="text" class="form-control form-control-lg" th:field="*{name}"
                               placeholder="Bijv. Cohort 19">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Startdatum</label>
                        <input type="date" class="form-control" th:field="*{startDate}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Omscholingsrichting</label>
                        <input type="text" class="form-control" th:field="*{subject}"
                               placeholder="Richting van de omscholing">
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Cohort Opslaan</button>
                        <button type="reset" class="btn btn-light text-muted">Formulier leegmaken</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
