<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/general :: header}">
    <meta charset="UTF-8">
    <title>Cohort Overzicht</title>
</head>
<body class="bg-light">
<div th:replace="~{fragments/general :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold" style="color: var(--bro-purple)">Ontdek Cohorten</h1>
    </div>

    <div class="row g-4">
        <div class="col-md-4" th:each="cohort : ${allCohorts}">
            <div class="card h-120">
                <div class="card-body">
                    <div class="badge mb-2" style="background: var(--bro-purple)"
                         th:text="${cohort.subject}">Opleiding</div>
                    <h5 class="card-title fw-bold" th:text="${cohort.name}">Cohort Naam</h5>
                    <p class="card-text text-muted small">Klik voor details en deelnemers.</p>
                </div>
                <div class="card-footer bg-transparent border-0 pb-3">
                    <a th:href="@{/cohort/details/{id}(id=${cohort.id})}" class="btn btn-primary w-100">Bekijk Cohort</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/general :: footer}"></div>
</body>
</html>
