<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/general :: header}">
    <meta charset="UTF-8">
    <title>Cohort Overzicht</title>
</head>
<body class="bg-light">
<div th:replace="~{fragments/general :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold" style="color: var(--bro-navy)">Ontdek Cohorten</h1>

    <a th:href="@{/cohort/add}" class="btn btn-primary shadow-sm">
        <i class="bi bi-plus-lg me-2"></i>Nieuw Cohort Toevoegen
    </a>
    </div>

    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="cohort : ${allCohorts}">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body p-4">
                    <div class="mb-2 d-flex justify-content-between align-items-start">
                        <div>
                            <i class="bi bi-mortarboard-fill" style="color: var(--bro-orange)"></i>
                            <span class="text-uppercase small fw-bold text-muted" th:text="${cohort.subject}">Opleiding</span>
                        </div>
                        <!-- DIT IS DE NIEUWE BADGE OP DE KAART -->
                        <span class="badge rounded-pill bg-light text-dark border">
                    <i class="bi bi-people-fill me-1" style="color: var(--bro-navy)"></i>
                    <span th:text="${cohort.participants.size()}">0</span>
                </span>
                    </div>

                    <h4 class="serif fw-bold mb-3" th:text="${cohort.name}" style="color: var(--bro-navy)">Naam</h4>

                    <p class="text-muted small mb-0">
                        <i class="bi bi-calendar3 me-2"></i>
                        Gestart op: <span th:text="${cohort.startDate}">Datum</span>
                    </p>
                </div>
                <div class="card-footer bg-transparent border-0 p-4 pt-0">
                    <a th:href="@{/cohort/details/{id}(id=${cohort.id})}" class="btn btn-primary w-100">
                        Details bekijken
                    </a>
                </div>
            </div>
        </div>
</div>

<div th:replace="~{fragments/general :: footer}"></div>
</body>
</html>
