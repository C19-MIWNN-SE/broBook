<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cohort Overzicht</title>
</head>
<body>

<div class="container">
    <h1>Overzicht van cohorten</h1>

    <table>
        <thead>
        <tr>
            <th>Naam</th>
            <th>Omschrijving</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cohort : ${allCohorts}">
            <td th:text="${cohort.name}">Cohort Naam</td>
            <td th:text="${cohort.getSubject()}">Omschrijving</td>

        </tr>
        </tbody>
    </table>

    <br>
    <a th:href="@{/cohort/add}">Nieuw Cohort Toevoegen</a>
    <br>
    <a th:href="@{/}">Terug naar startpagina</a>
</div>

</body>
</html>
