<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#content}, ~{})}">
<head>
    <title>Cohort details</title>
</head>
<body>
<div id="content">
    <div class="cohort-header text-center mb-0">
        <div class="container mb-3">
            <h1 class="display-4 serif fw-bold" th:text="${selectedCohort.name}"></h1>
            <p class="lead"  th:text="${selectedCohort.subject}"></p>

            <div class="badge rounded-pill px-3 py-1"
                 style="background: rgba(201, 168, 76, 0.15); color: var(--bro-orange);
                        border: 1px solid rgba(201, 168, 76, 0.3);">
                <i class="bi bi-people-fill me-2"></i>
                <span th:text="${selectedCohort.participants.size()} + ' Deelnemers'"></span>
            </div>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card p-4 shadow-sm border-0">

                    <div class="d-flex align-items-center justify-content-between mb-0"
                         role="button"
                         data-bs-toggle="collapse"
                         data-bs-target="#studentsCollapse"
                         aria-expanded="true"
                         style="cursor: pointer; user-select: none;">
                        <div class="d-flex align-items-center gap-2">
                            <h3 class="serif fw-bold mb-0" style="color: var(--bro-navy)">Studenten</h3>
                            <span class="badge rounded-pill px-2"
                                  style="background: rgba(201, 168, 76, 0.15); color: var(--bro-orange);
                                         border: 1px solid rgba(201, 168, 76, 0.3); font-size: 0.75rem;">
                                <span th:text="${students.size()}">0</span>
                            </span>
                        </div>
                        <i class="bi bi-chevron-up collapse-icon" id="studentsIcon"
                           style="font-size: 1.1rem; color: var(--bro-navy); transition: transform 0.3s ease;"></i>
                    </div>

                    <hr class="mt-3 mb-0">
                    <div class="collapse show" id="studentsCollapse">
                        <div class="row g-3 mt-1">

                            <div th:each="user : ${students}"
                                 class="col-md-6 col-xl-4">
                                <div class="cohort-detail-info-tile p-3 rounded d-flex flex-column align-items-center h-100 shadow-sm position-relative">
                                    <img th:if="${user.profilePicture != null}"
                                         th:src="@{/image/{id}(id=${user.profilePicture.id})}"
                                         class="profile-picture rounded-circle me-3"
                                         style="width: 100px; height: 100px; object-fit: cover;">

                                    <div th:if="${user.profilePicture == null}"
                                         class="profile-initials rounded-circle me-3 d-flex align-items-center justify-content-center fw-bold"
                                         style="width: 100px; height: 100px; font-size: 0.9rem;">
                                        <span th:text="${#strings.substring(user.firstName,0,1) + #strings.substring(user.lastName,0,1)}"></span>
                                    </div>

                                    <div class="flex-grow-1 mt-3 mb-3 overflow-hidden">
                                        <h6 class="mb-0 fw-bold text-truncate" th:text="${user.fullName}"></h6>
                                    </div>
                                    <a th:href="@{/info/detail/{id}(id=${user.id})}" class="stretched-link">
                                        <i class="bi bi-chevron-right text-secondary"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                        <div th:if="${students.isEmpty()}" class="text-center py-4">
                            <p class="text-muted small">Er zijn nog geen studenten gekoppeld.</p>
                        </div>
                    </div>

                    <hr class="mt-3 mb-3">

                    <div class="d-flex align-items-center justify-content-between mb-0"
                         role="button"
                         data-bs-toggle="collapse"
                         data-bs-target="#teachersCollapse"
                         aria-expanded="true"
                         style="cursor: pointer; user-select: none;">

                        <div class="d-flex align-items-center gap-2">
                            <h3 class="serif fw-bold mb-0" style="color: var(--bro-navy)">Docenten</h3>
                            <span class="badge rounded-pill px-2"
                                  style="background: rgba(201, 168, 76, 0.15); color: var(--bro-orange);
                                         border: 1px solid rgba(201, 168, 76, 0.3); font-size: 0.75rem;">
                                <span th:text="${teachers.size()}">0</span>
                            </span>
                        </div>
                        <i class="bi bi-chevron-up collapse-icon" id="teachersIcon"
                           style="font-size: 1.1rem; color: var(--bro-navy); transition: transform 0.3s ease;"></i>
                    </div>

                    <div class="collapse show" id="teachersCollapse">
                        <div class="row g-3 mt-1">

                            <div th:each="user : ${teachers}"
                                 class="col-md-6 col-xl-4">

                                <div class="cohort-detail-info-tile p-3 rounded d-flex flex-column align-items-center h-100 shadow-sm position-relative">
                                        <img th:if="${user.profilePicture != null}"
                                             th:src="@{/image/{id}(id=${user.profilePicture.id})}"
                                             class="profile-picture rounded-circle border shadow-sm"
                                             style="width: 100px; height: 100px; object-fit: cover;">

                                        <div th:if="${user.profilePicture == null}"
                                             class="profile-initials rounded-circle d-flex align-items-center justify-content-center fw-bold shadow-sm"
                                             style="width: 100px; height: 100px; font-size: 1.5rem;">
                                            <span th:text="${#strings.substring(user.firstName,0,1) + #strings.substring(user.lastName,0,1)}"></span>
                                        </div>

                                    <div class="flex-grow-1 overflow-hidden mt-3 mb-2 text-center">
                                        <h6 class="mb-0 fw-bold text-truncate" th:text="${user.fullName}"></h6>
                                    </div>
                                    <a th:href="@{/info/detail/{id}(id=${user.id})}" class="stretched-link">
                                        <i class="bi bi-chevron-right text-secondary"></i>
                                    </a>

                                </div>
                            </div>
                        </div>
                        <div th:if="${teachers.isEmpty()}" class="text-center py-4">
                            <p class="text-muted small">Er zijn nog geen docenten gekoppeld.</p>
                        </div>
                    </div>
                </div>
                <div class="mt-4">
                    <a th:href="@{/cohort/all}" class="btn btn-link text-decoration-none text-muted p-0">
                        <i class="bi bi-arrow-left me-2"></i>Terug naar overzicht
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
