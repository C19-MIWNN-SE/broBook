<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/general :: header}">
    <title>Cohort details</title>
</head>
<body>
<div th:replace="~{fragments/general :: navbar}"></div>

<div class="cohort-header text-center shadow-sm">
    <div class="container">
        <h1 class="display-4 serif fw-bold" th:text="${selectedCohort.name}"></h1>
        <p class="lead" style="color: rgba(255,255,255,0.7);" th:text="${selectedCohort.subject}"></p>

        <div class="badge rounded-pill px-3 py-2"
             style="background: rgba(201, 168, 76, 0.15); color: var(--bro-orange); border: 1px solid rgba(201, 168, 76, 0.3);">
            <i class="bi bi-people-fill me-2"></i>
            <span th:text="${selectedCohort.participants.size()} + ' Deelnemers'"></span>
        </div>
    </div>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card p-4 shadow-sm border-0">
                <h3 class="serif fw-bold mb-4" style="color: var(--bro-navy)">Deelnemers</h3>

                <div class="row g-3">
                    <div th:each="user : ${selectedCohort.participants}" class="col-md-6 col-xl-4">
                        <div class="info-tile p-3 rounded d-flex align-items-center h-100">
                            <img th:if="${user.profilePicture != null}"
                                 th:src="@{/image/{id}(id=${user.id})}"
                                 class="profile-picture rounded-circle me-3"
                                 style="width: 50px; height: 50px; object-fit: cover;">

                            <div th:if="${user.profilePicture == null}"
                                 class="profile-initials rounded-circle me-3 d-flex align-items-center justify-content-center fw-bold"
                                 style="width: 50px; height: 50px; font-size: 0.9rem;">
                                <span th:text="${#strings.substring(user.firstName,0,1) + #strings.substring(user.lastName,0,1)}"></span>
                            </div>

                            <div class="flex-grow-1 overflow-hidden">
                                <h6 class="mb-0 fw-bold text-truncate" th:text="${user.fullName}"></h6>
                                <small class="text-muted text-truncate d-block" th:text="${user.role}"></small>
                            </div>

                            <a th:href="@{/info/detail/{id}(id=${user.id})}" class="btn btn-sm text-secondary px-2">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </div>
                    </div>
                </div>

                <div th:if="${selectedCohort.participants.isEmpty()}" class="text-center py-5">
                    <i class="bi bi-people text-muted display-4"></i>
                    <p class="mt-3 text-muted">Er zijn nog geen deelnemers gekoppeld aan dit cohort.</p>
                </div>
            </div>

            <div class="mt-4">
                <a th:href="@{/cohort/all}" class="btn btn-link text-decoration-none text-muted p-0">
                    <i class="bi bi-arrow-left me-2"></i>Terug naar overzicht
                </a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/general :: footer}"></div>
<div th:replace="~{fragments/general :: scripts}"></div>
</body>
</html>
