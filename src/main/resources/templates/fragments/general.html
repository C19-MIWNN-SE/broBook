<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="header(title, extraHead)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:replace="${title}">broBook</title>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/css/Style.css}">
    <th:block th:replace="${extraHead}"/>
</head>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm mb-0 d-print-none">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="/">
            <span style="color: var(--bro-orange)">bro</span>Book
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link px-3" target="_blank"
                   href="https://it-omscholing.nl/">Make IT Work</a>
                <a class="nav-link px-3" sec:authorize="hasRole('ADMIN')" href="/user/all">Gebruikers</a>
                <a class="nav-link px-3" sec:authorize="hasRole('ADMIN')"
                   href="/cohort/all">Alle cohorten</a>
                <a class="nav-link px-3" sec:authorize="hasAnyRole('STUDENT','TEACHER')" href="/cohort/all">
                    Mijn cohort(en)
                </a>
            </div>
        </div>
        <div sec:authorize="isAuthenticated()" class="d-flex align-items-center ms-lg-3">
                    <span class="text-white-50 small me-3">
                        Ingelogd als: <span class="text-white fw-bold" sec:authentication="name">Gebruiker</span>
                    </span>

            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn btn-sm btn-outline-warning fw-bold">
                    <i class="bi bi-box-arrow-right me-1"></i> Uitloggen
                </button>
            </form>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="mt-5 py-3 border-top text-muted text-center">
    <p>broBook - Make IT Work NN</p>
</footer>

<div th:fragment="scripts">
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</div>

</html>
