<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<body>

<!--An input field for a form with validation feedback-->
<div th:fragment="formField(fieldName, labelName, placeholder, type)"
     th:with="submitted=${#fields.hasErrors('*')}"
     class="mb-3">
    <label class="form-label fw-bold small text-muted text-uppercase"
           th:text="${labelName}" th:for="${fieldName}">
        Label naam
    </label>
    <input th:type="${type}"
           class="form-control bg-light"
           th:id="${fieldName}"
           th:field="*{__${fieldName}__}"
           th:classappend=  "${#fields.hasErrors(fieldName)} ? 'is-invalid'
                            : (${submitted} ? 'is-valid' : '')"
           th:placeholder="${placeholder}">
    <span th:if="${#fields.hasErrors(fieldName)}"
          th:errors="*{__${fieldName}__}"
          class="invalid-feedback"></span>
</div>

<!--A disabled input field for a form-->
<div th:fragment="formFieldDisabled(fieldName, labelName, type)"
     class="mb-3">
    <label class="form-label fw-bold small text-muted text-uppercase"
           th:text="${labelName}" th:for="${fieldName}">
        Label naam
    </label>
    <input th:type="${type}"
           th:value="*{__${fieldName}__}"
           class="form-control bg-light"
           th:id="${fieldName}"
           disabled>
    <input th:field="*{__${fieldName}__}" type="hidden">
</div>

</body>
</html>
