<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${shownUser.getFullName()}">Naam</title>
</head>
<body>
<h1><span th:text="${shownUser.getFullName()}"></span>'s informatie</h1>

<!--//TODO image toevoegen-->
<img th:if="${shownUser.profilePicture != null}"
     style="width: 40px"
     th:src="@{/image/{id}(id=${shownUser.profilePicture.id})}">

<img th:unless="${shownUser.profilePicture != null}"
     style="width: 40px"
     th:src="|https://placehold.co/40x40?text=${shownUser.firstName}|">

<p>Geboortedatum: <span th:text="${shownUser.birthDate}"></span></p>
<p>Toekomstige werkgever: <span th:text="${shownUser.futureEmployer}"></span></p>
</body>
</html>
