<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Gebruikersoverzicht</title>
</head>
<body>

<div class="container">
    <h1>
        Gebruikersoverzicht
    </h1>

    <table>
        <thead>
        <tr>
            <th>Voornaam</th>
            <th>Achternaam</th>
            <th></th>
        </tr>
        </thead>
        <tbody>

        <tr th:each="user : ${allUsers}">
            <td th:text="${user.firstName}">Voornaam</td>
            <td th:text="${user.lastName}">Achternaam</td>
            <td><a th:href="@{/info/detail/{id}(id=${user.id})}">Informatie</a></td>
        </tr>
        </tbody>
    </table>


    <p><a th:href="@{/info/add}">Gebruikersinformatie toevoegen</a></p>
    <p><a th:href="@{/}">Terug naar start</a></p>
</div>

</body>
</html>
