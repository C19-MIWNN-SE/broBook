<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Gebruikersoverzicht</title>
</head>
<body>

<div class="container">
    <h1>
        Gebruikersoverzicht
    </h1>

    <div th:each="user : ${allUsers}">
        <p>
            <span th:text="${user.firstName}">Voornaam</span>
            <span th:text="${user.lastName}">Achternaam</span>
        </p>
    </div>

    <a th:href="@{/info/add}">Gebruikersinformatie toevoegen</a>
</div>

</body>
</html>
