<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#content})}">
<head>
    <title>Gebruikersoverzicht</title>
</head>
<body>
<div id="content">
    <div class="row mb-3">
        <div class="col">
            <h2 class="serif fw-bold" style="color: var(--bro-navy)">Gebruikersoverzicht</h2>
            <p class="text-muted">Hieronder staan alle studenten en docenten die zijn aangemeld.</p>
        </div>
    </div>

    <div class="mb-3">
        <a th:href="@{/user/add}" class="btn btn-primary">Nieuwe gebruiker toevoegen</a>
        <a th:href="@{/}" class="btn btn-outline-secondary ms-2">Terug naar start</a>
    </div>

    <div class="bg-white shadow-sm rounded p-3">
        <table class="table align-middle">
            <thead class="border-bottom">
            <tr>
                <th style="color: var(--bro-navy)">Foto</th>
                <th style="color: var(--bro-navy)">Naam</th>
                <th style="color: var(--bro-navy)">Rol</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${allUsers}">
                <td style="width: 60px;">
                    <img th:if="${user.profilePicture != null}"
                         th:src="@{/image/{id}(id=${user.profilePicture.id})}"
                         class="rounded-circle"
                         style="width: 40px; height: 40px; object-fit: cover; border: 1px solid #ddd;">

                    <div th:if="${user.profilePicture == null}"
                         class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center"
                         style="width: 40px; height: 40px; font-size: 0.8rem;">
                        <span th:text="${#strings.substring(user.firstName,0,1)}"></span>
                    </div>
                </td>

                <td>
                    <strong th:text="${user.fullName}">Naam</strong>
                </td>

                <td>
                    <span th:text="${user.role}">Rol</span>
                </td>

                <td class="text-end">
                    <a th:href="@{/info/detail/{id}(id=${user.id})}"
                       class="btn btn-sm btn-primary">
                        Bekijk profiel
                    </a>
                </td>

                <td class="text-end">
                    <button type="button" class="btn btn-sm btn-primary">Verwijder</button>
                    <button type="button" class="btn btn-sm btn-primary">Bewerk</button>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${allUsers.isEmpty()}" class="text-center p-4">
            <p class="text-muted">Er zijn nog geen gebruikers toegevoegd.</p>
        </div>
    </div>
</div>
</body>
</html>
