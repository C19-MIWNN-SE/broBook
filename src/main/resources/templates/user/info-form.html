<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#content})}">
<head>
    <title>Gebruiker toevoegen</title>
</head>
<body>
<div id="content">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow p-4 border-0">
                <h2 class="serif fw-bold mb-4" style="color: var(--bro-navy)">Persoonlijke informatie</h2>

                <form th:action="@{/info/save}"
                      th:object="${newUser}"
                      method="post"
                      enctype="multipart/form-data">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted text-uppercase">Voornaam</label>
                            <input type="text" class="form-control bg-light" th:field="*{firstName}"
                                   placeholder="Voornaam...">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted text-uppercase">Achternaam</label>
                            <input type="text" class="form-control bg-light" th:field="*{lastName}"
                                   placeholder="Achternaam...">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted text-uppercase">Geboortedatum</label>
                        <input type="date" class="form-control bg-light" th:field="*{birthDate}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted text-uppercase d-block">
                            Selecteer Cohort(en)</label>
                        <div class="p-3 border rounded bg-light" style="max-height: 150px; overflow-y: auto;">
                            <div th:each="cohort : ${allCohorts}" class="form-check">
                                <input type="checkbox"
                                       class="form-check-input"
                                       th:field="*{cohorts}"
                                       th:value="${cohort.id}"
                                       th:id="'cohort-' + ${cohort.id}">
                                <label class="form-check-label"
                                       th:for="'cohort-' + ${cohort.id}" th:text="${cohort.name}"></label>
                            </div>
                            <div th:if="${allCohorts.isEmpty()}" class="text-muted small italic">
                                Geen cohorten beschikbaar om te selecteren.
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted text-uppercase">Toekomstige werkgever</label>
                        <input type="text" class="form-control bg-light" th:field="*{futureEmployer}"
                               placeholder="Bijv. IBM of Univé">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted text-uppercase">
                            Vertel iets over jezelf</label>
                        <textarea class="form-control bg-light" th:field="*{bio}"
                                  rows="4" placeholder="Schrijf hier een korte bio..."></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted text-uppercase">Profielfoto</label>
                        <input type="file" id="imageFile" name="imageFile" accept="image/*"
                               class="form-control bg-light">
                        <div class="form-text text-muted">Door een foto te uploaden,
                            geef je broBook toestemming om deze binnen het afgeschermde
                            platform te tonen aan je mede-gebruikers.</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Profiel Opslaan</button>
                        <div class="d-flex gap-2">
                            <button type="reset" class="btn btn-light text-muted w-50 border">
                                Formulier leegmaken</button>
                            <a th:href="@{/user/all}" class="btn btn-light text-muted w-50 border">Annuleren</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
