<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#content})}">
<head>
    <title>Gebruiker toevoegen</title>
</head>
<body>
<div id="content">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow p-4 border-0">
                <h2 class="serif fw-bold mb-4" style="color: var(--bro-navy)">Persoonlijke informatie</h2>

                <form th:action="@{/info/save}"
                      th:object="${dtoToEdit}"
                      method="post"
                      enctype="multipart/form-data">
                    <input th:field="${dtoToEdit.id}" type="hidden">

                    <div class="row">
                        <div class="col-md-6">
                            <div th:replace="~{fragments/form :: formFieldDisabled(
                                'firstName', 'Voornaam', 'text')}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div th:replace="~{fragments/form :: formFieldDisabled(
                                'lastName', 'Achternaam', 'text')}">
                            </div>
                        </div>
                    </div>

                    <div th:replace="~{fragments/form :: formField(
                                'birthDate', 'Geboortedatum', '', 'date')}">
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div th:replace="~{fragments/form :: formField(
                                'residence', 'Woonplaats', 'Woonplaats...', 'text')}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div th:replace="~{fragments/form :: formField(
                                'futureEmployer', 'Toekomstige werkgever', 'Bijv. IBM of Univé', 'text')}">
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted text-uppercase">
                            Vertel iets over jezelf</label>
                        <textarea class="form-control bg-light" th:field="*{bio}"
                                  th:classappend="${#fields.hasErrors('bio')} ? 'is-invalid'"
                                  rows="4" placeholder="Schrijf hier een korte bio..."></textarea>
                        <span th:if="${#fields.hasErrors('bio')}"
                              th:errors="*{bio}"
                              class="invalid-feedback"></span>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted text-uppercase">Profielfoto</label>
                        <input type="file" id="imageFile" name="imageFile" accept="image/*"
                               class="form-control bg-light">
                        <div class="form-text text-muted">Door een foto te uploaden,
                            geef je broBook toestemming om deze binnen het afgeschermde
                            platform te tonen aan je mede-gebruikers.</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Profiel Opslaan</button>
                        <div class="d-flex gap-2">
                            <button type="reset" class="btn btn-light text-muted w-50 border">
                                Formulier leegmaken</button>
                            <a th:href="@{/user/all}" class="btn btn-light text-muted w-50 border">Annuleren</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
