<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>broBook</title>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>

<body class="d-flex h-100 text-center body-cover flex-column">

<div th:replace="~{fragments/general :: navbar}"></div>

<div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column justify-content-center">

    <main class="px-3">
        <h1 style="font-size:1000%;"><span style="color: var(--bro-orange)">bro</span>Book</h1>

        <p class="lead mb-5 fs-4">Welkom bij het smoelenboek voor Make IT Work - Noord Nederland</p>

        <div sec:authorize="!isAuthenticated()" class="mx-auto" style="max-width: 320px;">
            <form th:action="@{/login}" method="post" class="text-start">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-white-50">Gebruikersnaam</label>
                    <input type="text" name="username" class="form-control form-control-lg bg-light border-0"
                           placeholder="Gebruikersnaam" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-white-50">Wachtwoord</label>
                    <input type="password" name="password" class="form-control form-control-lg bg-light border-0"
                           placeholder="Wachtwoord" required>
                </div>
                <button type="submit" class="btn btn-lg btn-primary fw-bold w-100 py-3 shadow">
                    Inloggen
                </button>
            </form>

            <div>
                <a th:href="@{/activate/user}">Account activeren</a>
            </div>
        </div>

        <div sec:authorize="isAuthenticated()" class="py-4">
            <h3 class="serif mb-4">Je bent al ingelogd!</h3>
            <a th:href="@{/cohort/all}" class="btn btn-lg btn-outline-light px-5">Ga naar Dashboard</a>
        </div>

        <div class="mt-5 p-3 rounded" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
            <p class="small mb-0 text-white-50">
                <i class="bi bi-info-circle me-1"></i>
                Kun je niet inloggen? Neem contact op met je docent voor toegang tot broBook.
            </p>
        </div>
    </main>

     <footer class="mt-auto text-white-50 small py-3">
        <p>Een project van <span class="text-white">Binary Bro's</span> &copy; 2026</p>
    </footer>
</div>

 <div th:replace="~{fragments/general :: scripts}"></div>
</body>
</html>
