<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/general :: header(~{:: title})}">
    <Title>Inloggen - broBook</Title>
</head>
<body class="bg-light d-flex align-items-center py-4" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4 text-center">

            <h1 class="serif fw-bold mb-4" style="color: var(--bro-navy)">
                <span style="color: var(--bro-orange)">bro</span>Book
            </h1>

            <div class="card shadow-sm border-0 p-4">
                <h3 class="h5 mb-3 fw-bold text-muted">Inloggen</h3>

                <div th:if="${param.error}" class="alert alert-danger py-2 small">
                    Ongeldige gebruikersnaam of wachtwoord.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3 text-start">
                        <label class="form-label small fw-bold text-muted">Gebruikersnaam</label>
                        <input type="text" name="username" class="form-control" placeholder="VoornaamAchternaam"
                               required autofocus>
                    </div>
                    <div class="mb-4 text-start">
                        <label class="form-label small fw-bold text-muted">Wachtwoord</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button class="btn btn-primary w-100 py-2 fw-bold" type="submit">Aanmelden</button>
                </form>
            </div>

            <p class="mt-4 text-muted small">
                <a th:href="@{/}" class="text-decoration-none text-muted">← Terug naar start</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
