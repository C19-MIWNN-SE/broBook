<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::#content}, ~{::extraHead})}">
<head>
    <title>Printoverzicht activatiecodes</title>
    <th:block th:fragment="extraHead">
        <link rel="stylesheet" th:href="@{/css/print.css}"/>
    </th:block>
</head>
<body>
<div id="content">
    <div class="row row-cols-1 row-cols-md-2 g-4">
        <div th:each="activation : ${activations}" class="col print-col">
            <div class="card h-100 print-card">
                <div class="card-body d-flex flex-column justify-content-center align-items-center text-center">
                    <p class="card-text mb-1">Geef onderstaande code aan</p>
                    <p class="card-text fw-bold fs-5 mb-3"
                       th:text="${activation.user.getFullName()}">naam</p>

                    <div class="token fs-1 fw-bold font-monospace border border-2 border-dark rounded p-3 my-2 w-100"
                         th:text="${activation.token}">
                        Token
                    </div>

                    <p class="text-muted small mt-3 mb-0">Geldig tot:
                        <span th:text="${activation.expireDate}">Verloopdatum</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
